<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Vıret — Investor Briefing</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20fill='%23f6f3ec'/%3E%3Ccircle%20cx='16'%20cy='13'%20r='4.5'%20fill='%23164136'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f3ec;--card:#ece9e0;--ink:#201e19;--ink2:#5c574d;--ink3:#8a847a;
  --green:#164136;--green2:#2a6b57;--sage:#7fb8a4;
  --serif:'Source Serif 4',serif;--sans:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
  --ease:cubic-bezier(.4,0,.2,1);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
::selection{background:var(--green);color:var(--bg)}

/* Progress */
.progress{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;gap:6px;padding:12px 24px;background:linear-gradient(180deg,rgba(246,243,236,.95) 60%,transparent)}
.pdot{flex:1;height:3px;border-radius:2px;background:#d8d3c6;cursor:pointer;transition:background .3s var(--ease)}
.pdot.on{background:var(--green)}.pdot.was{background:var(--sage)}
.scnt{position:fixed;top:10px;right:24px;z-index:101;font:12px var(--mono);color:var(--ink3);font-variant-numeric:tabular-nums}

/* Deck */
.deck{position:relative;width:100%;height:100%;overflow:hidden}
.sl{position:absolute;inset:0;display:flex;flex-direction:column;padding:44px 48px 64px;opacity:0;pointer-events:none;transform:translateX(50px);transition:opacity .35s var(--ease),transform .35s var(--ease);overflow-y:auto}
.sl::before,.sl::after{content:'';flex:1 0 0px}
.sl.on{opacity:1;pointer-events:auto;transform:translateX(0)}
.sl.was{transform:translateX(-50px)}
.sl-c{max-width:940px;width:100%;margin:0 auto;flex-shrink:0}
.sl-center{text-align:center;display:flex;flex-direction:column;align-items:center}

/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:linear-gradient(0deg,rgba(246,243,236,.95) 60%,transparent)}
.nb{background:none;border:1px solid transparent;color:var(--ink3);font:500 14px var(--sans);cursor:pointer;padding:8px 16px;border-radius:6px;transition:all .2s}
.nb:hover:not(:disabled){color:var(--ink);border-color:#c9c3b4}.nb:disabled{opacity:.3;cursor:default}
.nb.hl{border-color:var(--green);color:var(--green)}
.nh{font:12px var(--mono);color:var(--ink3)}

/* Type */
h1{font-family:var(--serif);font-size:clamp(2rem,5vw,3.4rem);font-weight:500;line-height:1.12;letter-spacing:-.01em}
h2{font-family:var(--serif);font-size:clamp(1.5rem,3.5vw,2.5rem);font-weight:500;line-height:1.15;letter-spacing:-.01em}
h3{font-size:clamp(.95rem,1.9vw,1.25rem);font-weight:600;line-height:1.3}
p,.bt{font-size:clamp(.9rem,1.55vw,1.06rem);line-height:1.6;color:var(--ink2)}
strong{color:var(--ink);font-weight:600}
.acc{color:var(--green2)}
.kick{font:500 12px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--green2);margin-bottom:14px}
.sub{font-size:clamp(.78rem,1.2vw,.88rem);color:var(--ink3);letter-spacing:.02em}
.fn{font-size:12.5px;color:var(--ink3);margin-top:20px;font-style:italic}
.fn a,.rc a{color:inherit;text-decoration:underline;text-decoration-color:#b5ae9e;text-underline-offset:2px}
.fn a:hover,.rc a:hover{color:var(--green2)}

/* Competitor logos */
.lgrow{display:flex;gap:14px;align-items:center;margin-top:7px;flex-wrap:wrap}
.lg{height:13px;width:auto;display:block;color:var(--ink2);opacity:.8}
.lg path{fill:currentColor}
tr.us .lg{color:#dfe8e2}

.brand{font-family:var(--serif);font-size:clamp(3rem,7vw,5rem);font-weight:500;letter-spacing:.01em;color:var(--green)}

/* Wordmark tittle: hand-placed circle over the dotless ı */
.ti{position:relative;display:inline-block}
.ti::after{content:'';position:absolute;left:50%;top:.24em;transform:translateX(-50%);width:.15em;height:.15em;border-radius:50%;background:var(--green)}
.ti-x::after{left:62%}
.ti-s::after{background:var(--sage)}

/* Cards & grids */
.c{background:var(--card);border:1px solid #ddd8ca;border-radius:10px;padding:20px 24px}
.c-g{border-left:3px solid var(--green)}
.c-s{border-left:3px solid var(--sage)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
@media(max-width:760px){.g2,.g3,.g4{grid-template-columns:1fr}}
@media(max-width:900px){.g4{grid-template-columns:1fr 1fr}}

.m-num{font-family:var(--serif);font-size:clamp(1.7rem,3.6vw,2.6rem);font-weight:500;line-height:1;color:var(--green)}
.m-u{font-size:12.5px;color:var(--ink2);margin-top:6px;line-height:1.4}

.ri{display:flex;gap:16px;align-items:flex-start;padding:13px 0;border-bottom:1px solid #ddd8ca}
.ri:last-child{border-bottom:none}
.rn{width:32px;height:32px;border-radius:50%;background:var(--green);color:var(--bg);font:600 13px var(--sans);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rc h3{margin-bottom:2px;font-size:15px}.rc p{font-size:13.5px}
.pb{display:inline-block;font:500 10px var(--mono);letter-spacing:.06em;padding:2px 8px;border-radius:4px;background:#ddd8ca;color:var(--ink2);margin-left:8px;vertical-align:middle;text-transform:uppercase}

/* OS diagram */
.os{display:grid;grid-template-columns:1fr;gap:8px;margin-top:18px}
.os-row{background:var(--card);border:1px solid #ddd8ca;border-radius:8px;padding:12px 18px;display:flex;gap:14px;align-items:baseline;flex-wrap:wrap}
.os-row .lbl{font:500 11px var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--green2);min-width:120px}
.os-row p{font-size:13px;line-height:1.45}
.os-row.hl{border-color:var(--green);background:#164136;color:var(--bg)}
.os-row.hl .lbl{color:var(--sage)}.os-row.hl p{color:#dfe8e2}

.mt1{margin-top:8px}.mt2{margin-top:16px}.mt3{margin-top:24px}.mt4{margin-top:32px}
.mb2{margin-bottom:16px}

.cta{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;background:var(--green);color:var(--bg);font:600 15px var(--sans);border:none;border-radius:8px;cursor:pointer;transition:all .2s;text-decoration:none}
.cta:hover{background:var(--green2);transform:translateY(-1px)}

.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:18px}
table.cmp{width:100%;min-width:620px;border-collapse:collapse;font-size:13.5px}
table.cmp th{font:500 11px var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);text-align:left;padding:8px 12px;border-bottom:2px solid #ddd8ca}
table.cmp td{padding:10px 12px;border-bottom:1px solid #e4dfd2;color:var(--ink2);vertical-align:top;line-height:1.45}
table.cmp td:first-child{color:var(--ink);font-weight:600}
table.cmp tr.us td{background:#164136;color:#dfe8e2}
table.cmp tr.us td:first-child{color:#fff;border-radius:6px 0 0 6px}
table.cmp tr.us td:last-child{border-radius:0 6px 6px 0}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#c9c3b4;border-radius:3px}
@media(max-width:680px){.sl{padding:40px 22px 64px}}
</style>
</head>
<body>
<div class="progress" id="prog"></div>
<div class="scnt" id="cnt"></div>
<div class="deck" id="deck"></div>
<div class="nav">
  <button class="nb" id="pb" onclick="prev()">&#8249; Back</button>
  <span class="nh" id="pgnum"></span>
  <button class="nb" id="nb" onclick="next()">Next &#8250;</button>
</div>

<script>
const SLIDES = [

// 1 — Title / Purpose
{ id:'title', center:true, html:`
  <div class="brand">V<span class="ti">ı</span>ret</div>
  <h2 class="mt3" style="font-weight:400;font-size:clamp(1.15rem,2.4vw,1.6rem);max-width:720px">
    AI for human flour<span class="ti ti-x">ı</span>sh<span class="ti ti-x">ı</span>ng.
  </h2>
  <p class="mt3" style="max-width:640px">We help the world's most consequential mission organizations harness AI to deliver <strong>measurable human impact — owned by the people it serves.</strong></p>
  <p class="sub mt4">Founding round briefing &middot; July 2026</p>
`},

// 2 — Problem
{ id:'problem', html:`
  <p class="kick">The problem</p>
  <h2>They can buy strategy. They can buy pilots.<br/>They cannot buy results.</h2>
  <p class="mt3" style="max-width:820px">Foundations, ministries, and global health, agriculture, and education institutions want outcomes from AI — at speed and scale. They have lived the alternative:</p>
  <div class="g2 mt3">
    <div class="c c-s"><h3>Strategy that ends at the recommendation</h3><p class="mt1">Consultancies deliver the roadmap, then leave. The build never happens — or goes to a vendor with no stake in the mission.</p></div>
    <div class="c c-s"><h3>Pilots that die with the grant</h3><p class="mt1">Demos that never survive contact with a real clinic, farm, or ministry — because the knowledge walks out the door when the funding stops.</p></div>
  </div>
  <p class="mt3" style="max-width:840px"><strong>What no one sells them:</strong> a partner who builds, deploys, and <strong>sustains</strong> AI inside real operations — without taking ownership of their data, their systems, or their future. The bottleneck is no longer the model. It is product-builder capacity that leaves the client stronger and more independent, not more dependent.</p>
`},

// 3 — Why now
{ id:'whynow', html:`
  <p class="kick">Why now</p>
  <h2>Two shifts intersect — exactly here.</h2>
  <div class="g2 mt3">
    <div class="c c-g"><h3>The moat moved</h3><p class="mt1">Frontier labs are commoditizing models <strong>and</strong> generic agent orchestration — shipping both natively. Value is migrating to the layer that stays hard: <strong>evaluated, context-faithful deployment</strong> into complex, high-stakes institutional realities. That layer gets more valuable as everything beneath it gets cheaper.</p></div>
    <div class="c c-g"><h3>The ownership wave</h3><p class="mt1">Institutions and governments now demand control of their data, compute, and capability — in-region, in-jurisdiction, inspectable. Every lock-in vendor is swimming against this current. <strong>Viret is built on it.</strong></p></div>
  </div>
  <p class="mt3" style="max-width:840px">The window: mission organizations are budgeting for AI transformation <strong>now</strong>, the incumbents structurally cannot serve them, and the firms that can build at this grade do not work in these sectors.</p>
`},

// 4 — Solution
{ id:'solution', html:`
  <p class="kick">The solution</p>
  <h2>Viret OS — an agentic operating system the client owns.</h2>
  <p class="mt2" style="max-width:840px">One control plane that runs an organization's AI work across any model, any vendor, and the systems they already have. Ships as owned <strong>Capabilities</strong> — evaluated production workflows with benchmark suite and runbook. <strong>First production deployment inside 90 days.</strong></p>
  <div class="os">
    <div class="os-row"><span class="lbl">Your compute</span><p>Runs where the client chooses — on-prem, in-region, or sovereign cloud.</p></div>
    <div class="os-row"><span class="lbl">Your data</span><p>Owned, governed, in-jurisdiction — kept in human-readable form the client's staff can open, read, and edit.</p></div>
    <div class="os-row"><span class="lbl">Intelligence</span><p>Open-weight by default; commercial agents and vertical AIs where they are the right tool — swappable, never locked in.</p></div>
    <div class="os-row hl"><span class="lbl">Agentic harness</span><p>Composes intelligence, backends, and existing systems into the workflows that fit how the organization operates — web, WhatsApp, USSD, voice, offline.</p></div>
    <div class="os-row"><span class="lbl">Assurance</span><p>Continuous benchmarking against the client's real personas and use cases — proven before deployment, measured after, on the client's own operational record.</p></div>
  </div>
  <p class="fn">Human-in-the-loop by design: every deployment ships with an autonomy dial the client sets. Agents propose; designated people approve. Autonomy is a setting, not the pitch.</p>
`},

// 5 — Market
{ id:'market', html:`
  <p class="kick">Market</p>
  <h2>Impact is the P&amp;L — and the budgets are real.</h2>
  <div class="g3 mt3">
    <div style="text-align:center"><div class="m-num">$280B+</div><div class="m-u">annual philanthropic &amp; development spending — $174B DAC development assistance + $110B US foundation giving alone&sup1;</div></div>
    <div style="text-align:center"><div class="m-num">$200B+</div><div class="m-u">committed to sovereign AI programs across the Gulf and Africa — $100B Project Transcendence, $49B MGX fund, $60B Africa AI Fund&sup2;</div></div>
    <div style="text-align:center"><div class="m-num">$600B+</div><div class="m-u">projected worldwide AI-services spend by 2028 (Gartner)&sup3;</div></div>
  </div>
  <div class="c mt4">
    <h3>Bottoms-up: the serviceable market</h3>
    <p class="mt1" style="font-size:13.5px">~300 anchor institutions — the top ~100 foundations (the largest alone pays out <strong>$9B/yr through 2045</strong>&#8308;), priority ministries across ~40 countries in three sectors, and corporate adjacencies with board-level flourishing problems. At <strong>$1–2.5M per Build</strong> plus <strong>$200–500K/yr in Platform &amp; Assurance renewals</strong>, that is <strong>$300–750M in initial Builds and $100M+/yr recurring at scale</strong> — before sector templates compound margins on every repeat deployment.</p>
  </div>
  <p class="mt3" style="max-width:860px;font-size:14px">And the pressure is rising: development assistance fell <strong>23% in 2025 — the largest contraction on record</strong>.&sup1; Every remaining dollar must deliver more impact. That is precisely what Viret sells.</p>
  <p class="fn">&sup1; <a href="https://www.oecd.org/en/data/insights/data-explainers/2026/04/a-historic-decline-in-foreign-aid-preliminary-2025-oda-data.html" target="_blank" rel="noopener">OECD DAC, preliminary 2025 ODA</a> &middot; <a href="https://givingusa.org/giving-usa-2025-u-s-charitable-giving-grew-to-592-50-billion-in-2024-lifted-by-stock-market-gains/" target="_blank" rel="noopener">Giving USA 2025</a> &nbsp;&sup2; <a href="https://mei.edu/report/ai-the-gulf-and-the-us-a-primer/" target="_blank" rel="noopener">Middle East Institute, Gulf AI primer</a> &middot; <a href="https://www.forbes.com/sites/guneyyildiz/2026/07/03/abu-dhabis-49-billion-ai-fund-and-its-sovereign-rivals/" target="_blank" rel="noopener">Forbes: MGX first close, Jul 2026</a> &middot; <a href="https://businessday.ng/technology/article/africas-audacious-60bn-ai-bet-trails-global-counterparts/" target="_blank" rel="noopener">Africa AI Fund, Kigali 2025</a> &nbsp;&sup3; <a href="https://www.gartner.com/en/documents/5710751" target="_blank" rel="noopener">Gartner AI Services Forecast</a> &nbsp;&#8308; <a href="https://www.gatesfoundation.org/ideas/media-center/press-releases/2026/01/historic-annual-budget-to-accelerate-mission" target="_blank" rel="noopener">Gates Foundation, Jan 2026</a></p>
`},

// 6 — Competition
{ id:'competition', html:`
  <p class="kick">Competition</p>
  <h2>The quadrant nobody occupies.</h2>
  <p class="mt2" style="max-width:820px">The AI-transformation market splits three ways — and each is structurally unable to serve this sector on the client's terms:</p>
  <div class="tbl-wrap"><table class="cmp">
    <tr><th></th><th>Build grade</th><th>Client independence</th><th>Serves mission sector</th></tr>

// 7 — Business model
{ id:'model', html:`
  <p class="kick">Business model</p>
  <h2>Client-funded by design. Renewed by choice.</h2>
  <div class="g4 mt3">
    <div class="c c-g"><h3>Build</h3><p class="mt1" style="font-size:13px">Fixed-scope, outcome-priced deployments. Cash-positive — the wedge.</p><p class="mt2" style="font-size:12.5px"><strong>$1–2.5M</strong> per engagement<br/>~40% mobilization on signature<br/>~30–40% gross margin</p></div>
    <div class="c"><h3>Platform</h3><p class="mt1" style="font-size:13px">License the maintained harness, connectors, and sector templates. Clients can fork — the exit right is real.</p><p class="mt2" style="font-size:12.5px"><strong>$150–300K/yr</strong> license<br/>~80% gross margin<br/>template reuse compounds</p></div>
    <div class="c"><h3>Assure</h3><p class="mt1" style="font-size:13px">Continuous benchmarking, safety, and impact measurement. Renewable because we are independent — a vendor who sells you the model can't credibly grade it.</p><p class="mt2" style="font-size:12.5px"><strong>$100–250K/yr</strong> retainer<br/>~70% gross margin<br/>renews on independence</p></div>
    <div class="c"><h3>Enable</h3><p class="mt1" style="font-size:13px">Apprenticeship retainers that transfer capability — every team we train carries the platform onward.</p><p class="mt2" style="font-size:12.5px"><strong>$100–200K/yr</strong> retainer<br/>~50% gross margin<br/>seeds the next institution</p></div>
  </div>
  <div class="c c-g mt2">
    <p style="font-size:13.5px"><strong>Representative client:</strong> ~$1.5M Build in year one &rarr; <strong>$400–600K/yr recurring</strong> (Platform + Assure + Enable) at blended ~70% gross margin — <strong>~$3M of revenue over three years</strong> from one institution, with the recurring layer renewing by choice.</p>
  </div>
  <p class="mt3" style="max-width:860px">Each deployment strengthens the sector templates that make the next one <strong>faster and higher-margin</strong> — build the economic-planning capability once, then deploy it to every planning ministry. The quality signal: <strong>voluntary net revenue retention</strong> — clients who could leave freely, and instead expand.</p>
`},

// 8 — Go-to-market / pipeline
{ id:'gtm', html:`
  <p class="kick">Go to market</p>
  <h2>Warm pipeline, two contracting paths.</h2>
  <div class="mt3">
    <div class="ri"><div class="rn">1</div><div class="rc"><h3>Global-health funder <span class="pb">Scoping</span></h3><p>An agentic harness unifying scattered trial, regulatory, and manufacturing expertise — earlier, evidence-based go/no-go calls on which products to back.</p></div></div>
    <div class="ri"><div class="rn">2</div><div class="rc"><h3>Ministries of agriculture <span class="pb">Scoping</span></h3><p>Democratizing access to economywide (CGE) modelling to set smarter food and agriculture policy — an <a href="https://cgspace.cgiar.org/server/api/core/bitstreams/8d0bc66e-cb84-4f06-be87-4d7abd0b5fda/content" target="_blank" rel="noopener">expert-only model</a> turned agentic service, so ministries ask in plain language how an investment plays out for growth, jobs, poverty, and diets. Answers in hours, not months.</p></div></div>
    <div class="ri"><div class="rn">3</div><div class="rc"><h3>Leading family foundation <span class="pb">Qualified</span></h3><p>A living source of truth from fragmented grant and program data — institutional memory that appreciates instead of decaying.</p></div></div>
    <div class="ri"><div class="rn">4</div><div class="rc"><h3>Global consumer-goods company <span class="pb">Qualified</span></h3><p>An agentic system across hundreds of thousands of smallholder suppliers — supply security and regulatory compliance, with rising farmer incomes.</p></div></div>
  </div>
  <p class="mt3" style="max-width:860px">Two paths to contract: <strong>direct</strong> as a technology vendor, and <strong>via implementer</strong> — faster to first proof. Deal flow is seeded by an advisory relationship with a leading global consultancy whose build arms structurally cannot serve these clients.</p>
`},

// 9 — Team
{ id:'team', html:`
  <p class="kick">Team</p>
  <h2>Operators who have built at scale.</h2>
  <div class="c c-g mt3">
    <h3>Dan Grimm — Co-founder</h3>
    <p class="mt1" style="font-size:13.5px">Two decades leading strategy, product, and growth across 20+ countries — AT&amp;T, Amazon, RealNetworks, and startups he co-founded. Led a 200-person new-product organization at AT&amp;T (19 products, 14 patents); scaled a computer-vision business to 130 partners across 20 countries; ran 30+ growth and national-development engagements across 15 countries at Monitor Group. Advises a leading global consultancy on AI for global health and development.</p>
  </div>
  <div class="g2 mt2">
    <div class="c c-g"><h3 style="font-size:14px">Co-founder, forward-deployed engineering <span class="pb">In discussion</span></h3><p class="mt1" style="font-size:12.5px">Helped pioneer the forward-deployed model at the defining FDE company; founded and ran its Middle East office for five years.</p></div>
    <div class="c"><h3 style="font-size:14px">Head of engineering <span class="pb">Target hire</span></h3><p class="mt1" style="font-size:12.5px">Twenty years shipping consumer products at scale — early engineer at a company scaled 350K &rarr; 60M users; stood up a 0&rarr;1 mobile lab at a top-tier product company.</p></div>
    <div class="c"><h3 style="font-size:14px">Partner, Africa &amp; venture building <span class="pb">Target hire</span></h3><p class="mt1" style="font-size:12.5px">MIT PhD and former strategy-consulting principal turned pan-African venture builder; COO of a retail-distribution platform serving 1M+ merchants across five countries. Based in Nairobi.</p></div>
    <div class="c"><h3 style="font-size:14px">Partner, enterprise &amp; Middle East <span class="pb">Target hire</span></h3><p class="mt1" style="font-size:12.5px">Eleven years to GM at a global software leader; founded an enterprise-software venture acquired by a Fortune 500. Operator across the US, Europe, the Gulf, and South Asia.</p></div>
  </div>
  <p class="fn">Named with consent, as roles close. Forward-deployed delivery in Lagos, Nairobi, Addis Ababa, and Abu Dhabi — where the work happens, not a remote delivery center.</p>
`},

// 10 — Ask / Vision
{ id:'ask', html:`
  <p class="kick">The ask</p>
  <h2>Client-funded by design.<br/>A founding round to bridge to it.</h2>
  <p class="mt3" style="max-width:840px">Builds are outcome-priced and cash-positive from engagement one. We are raising a <strong>$500K founding round (SAFE)</strong> to bridge to the first two deployments and fund the platform layer — alongside conversations with catalytic funders for the open sector templates.</p>
  <div class="g3 mt3">
    <div class="c"><h3 style="font-size:14px">Founding team</h3><p class="mt1" style="font-size:13px">Close the first two senior roles alongside engagement one.</p></div>
    <div class="c"><h3 style="font-size:14px">Lighthouse deployments</h3><p class="mt1" style="font-size:13px">Two production systems live, running, and measured — proof the model works.</p></div>
    <div class="c"><h3 style="font-size:14px">Platform v1</h3><p class="mt1" style="font-size:13px">The harness and first sector templates that make deployment two cheaper than deployment one.</p></div>
  </div>
  <p class="mt4" style="max-width:860px"><strong>Every engagement ends the same way:</strong> the system running, the client's people running it, and more of what matters — health, learning, livelihoods — measurably within people's reach. <span class="acc" style="font-family:var(--serif);font-style:italic">That is what it means for it to flourish.</span></p>
  <a class="cta mt4" id="contact-cta" data-u="olleh" data-d="ia.teriv" href="#">Start a conversation &rarr;</a>
`},

const N = SLIDES.length;
let cur = 0, tx0 = 0, ty0 = 0;

function buildDeck(){
  const dk = document.getElementById('deck');
  SLIDES.forEach((s,i)=>{
    const d = document.createElement('div');
    d.className = 'sl'; d.dataset.i = i;
    d.innerHTML = '<div class="sl-c'+(s.center?' sl-center':'')+'">'+s.html+'</div>';
    dk.appendChild(d);
  });
  const p = document.getElementById('prog');
  for(let i=0;i<N;i++){const d=document.createElement('div');d.className='pdot';d.onclick=()=>go(i);p.appendChild(d);}
}
function go(i){
  cur = Math.max(0,Math.min(N-1,i));
  document.querySelectorAll('.sl').forEach((s,j)=>{s.classList.remove('on','was');if(j<cur)s.classList.add('was');if(j===cur)s.classList.add('on');});
  document.querySelectorAll('.pdot').forEach((d,j)=>{d.classList.toggle('on',j===cur);d.classList.toggle('was',j<cur);});
  document.getElementById('cnt').textContent = (cur+1)+'/'+N;
  document.getElementById('pgnum').innerHTML = cur===0 ? '&larr; &rarr; or swipe' : (cur+1)+' / '+N;
  document.getElementById('pb').disabled = cur===0;
  const nb = document.getElementById('nb'); nb.disabled = cur===N-1; nb.classList.toggle('hl',cur<N-1);
}
function next(){if(cur<N-1)go(cur+1)} function prev(){if(cur>0)go(cur-1)}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  if(e.key==='ArrowLeft'){e.preventDefault();prev();}
});
let swipeOk = true;
document.addEventListener('touchstart',e=>{tx0=e.changedTouches[0].screenX;ty0=e.changedTouches[0].screenY;swipeOk=!e.target.closest('.tbl-wrap');},{passive:true});
document.addEventListener('touchend',e=>{if(!swipeOk)return;const dx=e.changedTouches[0].screenX-tx0,dy=e.changedTouches[0].screenY-ty0;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){dx<0?next():prev();}},{passive:true});

buildDeck(); go(0);

// Assemble the contact email at runtime so it never appears in static HTML.
(function(){
  var a = document.getElementById('contact-cta');
  if(!a) return;
  var rev = function(s){return s.split('').reverse().join('');};
  a.setAttribute('href','mailto:'+rev(a.getAttribute('data-u'))+'@'+rev(a.getAttribute('data-d')));
})();
</script>
